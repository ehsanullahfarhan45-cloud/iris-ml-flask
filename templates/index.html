<!DOCTYPE html>
<html>
<head>
    <title>Iris AI Predictor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 420px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        .title {
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            color: green;
        }
    </style>
</head>

<body>

<div class="card">

    <h3 class="title">🌸 Iris Flower AI Predictor</h3>

    <form action="/predict" method="post">

        <input class="form-control mb-2" name="sl" placeholder="Sepal Length">
        <input class="form-control mb-2" name="sw" placeholder="Sepal Width">
        <input class="form-control mb-2" name="pl" placeholder="Petal Length">
        <input class="form-control mb-3" name="pw" placeholder="Petal Width">

        <button class="btn btn-primary w-100">Predict</button>

    </form>

    {% if result %}
        <div class="result">
            Result: {{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
