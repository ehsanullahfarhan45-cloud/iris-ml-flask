<!DOCTYPE html>
<html>
<head>
    <title>Iris AI Predictor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        .card {
            margin-top: 50px;
            border-radius: 20px;
            padding: 20px;
        }

        .result {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">

                <h2 class="text-center">🌸 Iris Flower Predictor</h2>

                <form action="/predict" method="post">

                    <input class="form-control mt-3" type="text" name="sl" placeholder="Sepal Length">
                    <input class="form-control mt-3" type="text" name="sw" placeholder="Sepal Width">
                    <input class="form-control mt-3" type="text" name="pl" placeholder="Petal Length">
                    <input class="form-control mt-3" type="text" name="pw" placeholder="Petal Width">

                    <button class="btn btn-primary w-100 mt-4">Predict</button>

                </form>

                {% if result %}
                    <div class="result text-center text-success">
                        Result: {{ result }}
                    </div>
                {% endif %}

            </div>

        </div>
    </div>
</div>

</body>
</html>
